<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>StockFloor - Tutorial</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #08090f;
  --surface: #10131c;
  --surface2: #171b27;
  --border: #252b3d;
  --accent: #00e5a0;
  --blue: #00b8ff;
  --red: #ff4466;
  --green: #00e5a0;
  --text: #eef0f7;
  --muted: #6b7394;
  --mono: 'Space Mono', monospace;
  --sans: 'Syne', sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: var(--sans);
  color: var(--text);
  background: var(--bg);
  display: flex;
  flex-direction: column;
}

.top {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 14px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
}
.back-btn {
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text);
  border-radius: 9px;
  padding: 8px 10px;
  font-family: var(--mono);
  font-size: 12px;
}
.title {
  font-size: 18px;
  font-weight: 800;
}
.sub {
  margin-left: auto;
  color: var(--muted);
  font-family: var(--mono);
  font-size: 11px;
}

.wrap {
  flex: 1;
  overflow-y: auto;
  padding: 14px;
}

.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 16px;
}
.step-kicker {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 2px;
  color: var(--accent);
  text-transform: uppercase;
}
.step-title {
  margin-top: 8px;
  font-size: 24px;
  line-height: 1.05;
  font-weight: 800;
}
.step-text {
  margin-top: 10px;
  color: var(--muted);
  font-size: 14px;
  line-height: 1.5;
}

.demo {
  margin-top: 14px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 12px;
}
.row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-family: var(--mono);
  font-size: 12px;
}
.row + .row { margin-top: 7px; }
.green { color: var(--green); }
.red { color: var(--red); }

.controls {
  margin-top: 14px;
  display: flex;
  gap: 8px;
}
.btn {
  flex: 1;
  border: none;
  border-radius: 10px;
  padding: 12px;
  font-size: 14px;
  font-weight: 800;
}
.btn-prev {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
}
.btn-next {
  background: var(--accent);
  color: #000;
}

.dots {
  margin-top: 14px;
  display: flex;
  justify-content: center;
  gap: 7px;
}
.dot {
  width: 8px;
  height: 8px;
  border-radius: 999px;
  background: var(--border);
}
.dot.active {
  width: 22px;
  background: var(--accent);
}

.quick-actions {
  margin-top: 12px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}
.mini {
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
  border-radius: 10px;
  padding: 10px;
  font-family: var(--mono);
  font-size: 11px;
}

@media (max-width: 420px) {
  .step-title { font-size: 21px; }
  .step-text { font-size: 13px; }
  .sub { display: none; }
  .quick-actions { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
  <div class="top">
    <button class="back-btn" onclick="goNext()">← Back</button>
    <div class="title">Quick Tutorial</div>
    <div class="sub">Interactive</div>
  </div>

  <div class="wrap">
    <div class="card">
      <div class="step-kicker" id="stepKicker">Step 1 / 4</div>
      <div class="step-title" id="stepTitle"></div>
      <div class="step-text" id="stepText"></div>

      <div class="demo">
        <div class="row"><span>Ticker</span><strong id="demoTicker">APEX</strong></div>
        <div class="row"><span>Price</span><strong id="demoPrice">$142.50</strong></div>
        <div class="row"><span># Held</span><strong id="demoHeld">0</strong></div>
        <div class="row"><span>P&L</span><strong id="demoPnl" class="green">+$0.00</strong></div>
      </div>

      <div class="controls">
        <button class="btn btn-prev" id="prevBtn">Prev</button>
        <button class="btn btn-next" id="nextBtn">Next</button>
      </div>

      <div class="dots" id="dots"></div>

      <div class="quick-actions">
        <button class="mini" id="simBuy">Simulate Buy +1</button>
        <button class="mini" id="simSell">Simulate Sell -1</button>
      </div>
    </div>
  </div>

<script>
const steps = [
  {
    title: 'Join the market',
    text: 'When the market is open, enter your name on the main page. Your personal run timer starts immediately after you join.'
  },
  {
    title: 'Read momentum quickly',
    text: 'Green means up and red means down. Tap any stock row to open the trade drawer and choose Buy or Sell.'
  },
  {
    title: 'Manage your position size',
    text: 'Use +/- to adjust quantity. In Sell mode, use Sell All for fast exits. Watch # Held so you do not oversell.'
  },
  {
    title: 'Track your score',
    text: 'Monitor Portfolio, P&L, and Rank while trading. When your timer ends, positions are liquidated and you can keep watching live standings.'
  }
];

let step = 0;
let held = 0;
let price = 142.5;
let avg = 142.5;
const TUTORIAL_DONE_KEY = 'sf_tutorial_done';
const rawNextPath = new URLSearchParams(location.search).get('next') || 'index.html';
const nextPath = sanitizeNextPath(rawNextPath);

function renderStep() {
  document.getElementById('stepKicker').textContent = `Step ${step + 1} / ${steps.length}`;
  document.getElementById('stepTitle').textContent = steps[step].title;
  document.getElementById('stepText').textContent = steps[step].text;
  document.getElementById('prevBtn').disabled = step === 0;
  document.getElementById('nextBtn').textContent = step === steps.length - 1 ? 'Done' : 'Next';
  renderDots();
}

function renderDots() {
  document.getElementById('dots').innerHTML = steps.map((_, i) =>
    `<div class="dot ${i === step ? 'active' : ''}"></div>`
  ).join('');
}

function renderDemo() {
  document.getElementById('demoPrice').textContent = `$${price.toFixed(2)}`;
  document.getElementById('demoHeld').textContent = String(held);
  const pnl = held * (price - avg);
  const pnlEl = document.getElementById('demoPnl');
  pnlEl.textContent = `${pnl >= 0 ? '+' : '-'}$${Math.abs(pnl).toFixed(2)}`;
  pnlEl.className = pnl >= 0 ? 'green' : 'red';
}

document.getElementById('prevBtn').addEventListener('click', () => {
  step = Math.max(0, step - 1);
  renderStep();
});

document.getElementById('nextBtn').addEventListener('click', () => {
  if (step === steps.length - 1) {
    localStorage.setItem(TUTORIAL_DONE_KEY, '1');
    goNext();
    return;
  }
  step += 1;
  renderStep();
});

function goNext() {
  location.href = nextPath;
}

function sanitizeNextPath(next) {
  const str = String(next || 'index.html');
  if (str.startsWith('http://') || str.startsWith('https://') || str.startsWith('//')) return 'index.html';
  if (str.startsWith('/')) return str;
  if (str.endsWith('.html') || str === 'index.html') return str;
  return 'index.html';
}

document.getElementById('simBuy').addEventListener('click', () => {
  held += 1;
  price += 0.9;
  renderDemo();
});

document.getElementById('simSell').addEventListener('click', () => {
  if (held <= 0) return;
  held -= 1;
  price = Math.max(0.5, price - 0.7);
  renderDemo();
});

renderStep();
renderDemo();
</script>
</body>
</html>
